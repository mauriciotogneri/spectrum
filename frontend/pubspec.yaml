name: testflow
description: Testing tool
publish_to: none
version: 0.0.1+1

environment:
  sdk: '>=3.7.0 <4.0.0'

dependencies:
  web: ^1.1.0
  get_it: ^8.0.3
  logger: ^2.5.0
  dafluta: ^5.4.0
  event_bus: ^2.0.1
  go_router: ^14.8.0
  file_picker: ^9.0.0
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1

  # https://github.com/firebase/flutterfire/blob/master/VERSIONS.md
  cloud_firestore: ^5.6.4
  cloud_functions: ^5.3.3
  firebase_core: ^3.12.0
  firebase_auth: ^5.5.0
  firebase_storage: ^12.4.3
  firebase_analytics: ^11.4.3
  firebase_crashlytics: ^4.3.3

  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

dev_dependencies:
  dalocale: ^2.5.0
  daassets: ^1.5.0
  daunused: ^1.6.1
  dapublock: ^1.1.0
  build_runner: ^2.4.15
  flutter_lints: ^5.0.0
  json_serializable: ^6.9.4

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/